<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="1049" cy="647" r="44" fill="#16213e" opacity="0.14"/>
    <circle cx="-36" cy="101" r="24" fill="#16213e" opacity="0.12"/>
    <circle cx="543" cy="142" r="29" fill="#16213e" opacity="0.19"/>
    <circle cx="6" cy="137" r="74" fill="#16213e" opacity="0.08"/>
    <circle cx="1141" cy="590" r="52" fill="#16213e" opacity="0.20"/>
    <circle cx="265" cy="726" r="28" fill="#16213e" opacity="0.05"/>
    <rect x="129" y="517" width="23" height="90" rx="8" fill="#1a1a2e" opacity="0.12" transform="rotate(4, 1087, -21)"/>
    <rect x="1279" y="84" width="95" height="93" rx="8" fill="#1a1a2e" opacity="0.12" transform="rotate(23, 1248, 121)"/>
    <rect x="294" y="-79" width="61" height="24" rx="8" fill="#1a1a2e" opacity="0.11" transform="rotate(29, 457, 611)"/>
    <rect x="970" y="204" width="21" height="98" rx="8" fill="#1a1a2e" opacity="0.08" transform="rotate(31, 483, 6)"/>
    <rect x="887" y="666" width="84" height="21" rx="8" fill="#1a1a2e" opacity="0.04" transform="rotate(21, 1178, 539)"/>
    <rect x="-71" y="397" width="63" height="53" rx="8" fill="#1a1a2e" opacity="0.14" transform="rotate(19, 490, 188)"/>
    <rect x="361" y="623" width="67" height="61" rx="8" fill="#1a1a2e" opacity="0.12" transform="rotate(6, -28, 434)"/>
    <rect x="1021" y="599" width="33" height="41" rx="8" fill="#1a1a2e" opacity="0.14" transform="rotate(5, 1094, 453)"/>
    <polygon points="841,353 928,527 754,527" fill="#16213e" opacity="0.11"/>
    <polygon points="532,622 592,742 472,742" fill="#16213e" opacity="0.12"/>
    <polygon points="654,511 674,551 634,551" fill="#16213e" opacity="0.08"/>
    <polygon points="-16,-1 54,139 -86,139" fill="#16213e" opacity="0.11"/>

  <!-- Wave at bottom -->
  <path d="M0,562 C360,596 840,528 1200,562 L1200,630 L0,630Z" fill="#16213e" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    구글 상위노출 대행
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 서버 웜업
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#e94560" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#e94560" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 구글 상위노출 대행 — 서버 웜업
  </text>
</svg>